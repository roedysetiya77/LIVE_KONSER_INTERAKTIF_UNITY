<!DOCTYPE html>
<html lang="en-us">
  <head>
    <meta charset="utf-8">
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
    <title>Unity Web Player | Tiktok Game Live</title>
    <link rel="shortcut icon" href="TemplateData/favicon.ico">
    <link rel="stylesheet" href="TemplateData/style.css">
    
    <!-- 1. MEMUAT LIBRARY SOCKET.IO UNTUK WEBGL BROWSER -->
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
  </head>
  <body>
    <div id="unity-container" class="unity-desktop">
      <canvas id="unity-canvas" width=960 height=600 tabindex="-1"></canvas>
      <div id="unity-loading-bar">
        <div id="unity-logo"></div>
        <div id="unity-progress-bar-empty">
          <div id="unity-progress-bar-full"></div>
        </div>
      </div>
      <div id="unity-warning"> </div>
      <div id="unity-footer">
        <div id="unity-logo-title-footer"></div>
        <div id="unity-fullscreen-button"></div>
        <div id="unity-build-title">Tiktok Game Live</div>
      </div>
    </div>
    <script>
      var canvas = document.querySelector("#unity-canvas");

      function unityShowBanner(msg, type) {
        var warningBanner = document.querySelector("#unity-warning");
        function updateBannerVisibility() {
          warningBanner.style.display = warningBanner.children.length ? 'block' : 'none';
        }
        var div = document.createElement('div');
        div.innerHTML = msg;
        warningBanner.appendChild(div);
        if (type == 'error') div.style = 'background: red; padding: 10px;';
        else {
          if (type == 'warning') div.style = 'background: yellow; padding: 10px;';
          setTimeout(function() {
            warningBanner.removeChild(div);
            updateBannerVisibility();
          }, 5000);
        }
        updateBannerVisibility();
      }

      var buildUrl = "Build";
      var loaderUrl = buildUrl + "/WebGL.loader.js";
      var config = {
        arguments: [],
        dataUrl: buildUrl + "/WebGL.data",
        frameworkUrl: buildUrl + "/WebGL.framework.js",
        codeUrl: buildUrl + "/WebGL.wasm",
        streamingAssetsUrl: "StreamingAssets",
        companyName: "DefaultCompany",
        productName: "Tiktok Game Live",
        productVersion: "0.0.18",
        showBanner: unityShowBanner,
      };

      if (/iPhone|iPad|iPod|Android/i.test(navigator.userAgent)) {
        var meta = document.createElement('meta');
        meta.name = 'viewport';
        meta.content = 'width=device-width, height=device-height, initial-scale=1.0, user-scalable=no, shrink-to-fit=yes';
        document.getElementsByTagName('head')[0].appendChild(meta);
        document.querySelector("#unity-container").className = "unity-mobile";
        canvas.className = "unity-mobile";
      } else {
        canvas.style.width = "960px";
        canvas.style.height = "600px";
      }

      document.querySelector("#unity-loading-bar").style.display = "block";

      var script = document.createElement("script");
      script.src = loaderUrl;
      script.onload = () => {
        createUnityInstance(canvas, config, (progress) => {
          document.querySelector("#unity-progress-bar-full").style.width = 100 * progress + "%";
        }).then((unityInstance) => {
          
          // 2. MENYIMPAN INSTANSI UNITY AGAR BISA DIPANGGIL JAVASCRIPT
          window.gameInstance = unityInstance;

          document.querySelector("#unity-loading-bar").style.display = "none";
          document.querySelector("#unity-fullscreen-button").onclick = () => {
            unityInstance.SetFullscreen(1);
          };

        }).catch((message) => {
          alert(message);
        });
      };

      document.body.appendChild(script);

      // ====================================================================
      // 3. FUNGSI JEMBATAN (WEBGL BRIDGE) YANG DICARI OLEH UNITY CLIENT
      // ====================================================================
      function HubungkanSocketDariUnity(username) {
        console.log("🔌 Menghubungkan ke room TikTok via WebGL Bridge: " + username);
        
        // Sesuaikan URL ini dengan backend server game TikTok Anda
        const targetServer = "https://game-tiktok.onrender.com";
        
        const socket = io(targetServer, {
          query: { room: username }
        });

        socket.on("connect", () => {
          console.log("✅ Terhubung ke Server Node.js dari Browser!");
          
          if (window.gameInstance) {
            // PENTING: Ganti "TikTokClient" dengan nama GameObject tempat script Anda berada di Hierarchy Unity
            window.gameInstance.SendMessage('TikTokClient', 'SinyalKoneksiSuksesDariBrowser', 'Sukses terhubung via WebGL!');
          }
        });

        socket.on("tiktok-to-unity", (data) => {
          if (window.gameInstance) {
            let jsonString = typeof data === 'object' ? JSON.stringify(data) : data;
            window.gameInstance.SendMessage('TikTokClient', 'TerimaDataTikTokDariBrowser', jsonString);
          }
        });
        
        socket.on("tiktok-action", (data) => {
          if (window.gameInstance) {
            let jsonString = typeof data === 'object' ? JSON.stringify(data) : data;
            window.gameInstance.SendMessage('TikTokClient', 'TerimaDataTikTokDariBrowser', jsonString);
          }
        });

        socket.on("disconnect", () => {
          console.log("❌ Terputus dari server Node.js.");
        });
      }

    </script>
  </body>
</html>
