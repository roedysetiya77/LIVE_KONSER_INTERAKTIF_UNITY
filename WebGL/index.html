<!DOCTYPE html>
<html lang="en-us">
  <head>
    <meta charset="utf-8">
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
    <title>Unity Web Player | Tiktok Game Live</title>
    <link rel="shortcut icon" href="TemplateData/favicon.ico">
    <link rel="stylesheet" href="TemplateData/style.css">
    
    <!-- 1. IMPORT LIBRARY SOCKET.IO DARI CDN AGAR BROWSER BISA TERHUBUNG KE RENDER -->
    <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
  </head>
  <body>
    <div id="unity-container" class="unity-desktop">
      <canvas id="unity-canvas" width=960 height=600 tabindex="-1"></canvas>
      <div id="unity-loading-bar">
        <div id="unity-logo"></div>
        <div id="unity-progress-bar-empty">
          <div id="unity-progress-bar-full"></div>
        </div>
      </div>
      <div id="unity-warning"> </div>
      <div id="unity-footer">
        <div id="unity-logo-title-footer"></div>
        <div id="unity-fullscreen-button"></div>
        <div id="unity-build-title">Tiktok Game Live</div>
      </div>
    </div>
    <script>
      var canvas = document.querySelector("#unity-canvas");
      var myGameInstance = null; // Menyimpan instance Unity secara global

      function unityShowBanner(msg, type) {
        var warningBanner = document.querySelector("#unity-warning");
        function updateBannerVisibility() {
          warningBanner.style.display = warningBanner.children.length ? 'block' : 'none';
        }
        var div = document.createElement('div');
        div.innerHTML = msg;
        warningBanner.appendChild(div);
        if (type == 'error') div.style = 'background: red; padding: 10px;';
        else {
          if (type == 'warning') div.style = 'background: yellow; padding: 10px;';
          setTimeout(function() {
            warningBanner.removeChild(div);
            updateBannerVisibility();
          }, 5000);
        }
        updateBannerVisibility();
      }

      var buildUrl = "Build";
      var loaderUrl = buildUrl + "/WebGL.loader.js";
      var config = {
        arguments: [],
        dataUrl: buildUrl + "/WebGL.data",
        frameworkUrl: buildUrl + "/WebGL.framework.js",
        codeUrl: buildUrl + "/WebGL.wasm",
        streamingAssetsUrl: "StreamingAssets",
        companyName: "DefaultCompany",
        productName: "Tiktok Game Live",
        productVersion: "0.0.17",
        showBanner: unityShowBanner,
      };

      if (/iPhone|iPad|iPod|Android/i.test(navigator.userAgent)) {
        var meta = document.createElement('meta');
        meta.name = 'viewport';
        meta.content = 'width=device-width, height=device-height, initial-scale=1.0, user-scalable=no, shrink-to-fit=yes';
        document.getElementsByTagName('head')[0].appendChild(meta);
        document.querySelector("#unity-container").className = "unity-mobile";
        canvas.className = "unity-mobile";
      } else {
        canvas.style.width = "960px";
        canvas.style.height = "600px";
      }

      document.querySelector("#unity-loading-bar").style.display = "block";

      // ====================================================================
      // LOGIKA AKTIF JEMBATAN KONEKSI SOCKET DARI UNITY KE BROWSER
      // ====================================================================
      window.HubungkanSocketDariUnity = function(roomName) {
        console.log("🔌 [WEBGL BRIDGE] Memulai koneksi Socket.io untuk Room:", roomName);
        
        if (typeof io !== 'undefined') {
            const serverUrl = "https://game-tiktok.onrender.com";
            
            // Buat koneksi socket dengan membawa query room (username TikTok)
            const socket = io(serverUrl, {
                query: { room: roomName },
                transports: ['websocket', 'polling']
            });

            socket.on("connect", function() {
                console.log("✅ [BROWSER JS] Sukses Terhubung ke Node.js Server!");
                
                // Beritahu Unity bahwa koneksi telah sukses terhubung
                // PENTING: Ganti "TikTokManager" dengan nama GameObject tempat script C# Anda menempel di Unity!
                if (myGameInstance) {
                    myGameInstance.SendMessage("TikTokManager", "SinyalKoneksiSuksesDariBrowser", "Terhubung ke " + roomName);
                }
            });

            // Mendengarkan event 'tiktok-action' dari server Node.js Anda
            socket.on("tiktok-action", function(data) {
                if (myGameInstance) {
                    // Kirim string JSON mentah kembali ke Unity C#
                    myGameInstance.SendMessage("TikTokManager", "TerimaDataTikTokDariBrowser", JSON.stringify(data));
                }
            });

            // Mendengarkan event 'tiktok-to-unity' (opsional jika server Anda mengirim ini)
            socket.on("tiktok-to-unity", function(data) {
                if (myGameInstance) {
                    myGameInstance.SendMessage("TikTokManager", "TerimaDataTikTokDariBrowser", JSON.stringify(data));
                }
            });

            socket.on("connect_error", function(err) {
                console.error("❌ [BROWSER JS] Gagal koneksi ke server Render:", err.message);
            });
        } else {
            console.error("❌ Library Socket.io gagal dimuat di browser!");
        }
      };
      // ====================================================================

      var script = document.createElement("script");
      script.src = loaderUrl;
      script.onload = () => {
        createUnityInstance(canvas, config, (progress) => {
          document.querySelector("#unity-progress-bar-full").style.width = 100 * progress + "%";
        }).then((unityInstance) => {
          myGameInstance = unityInstance; // Simpan ke variabel global agar bisa dipakai di SendMessage
          document.querySelector("#unity-loading-bar").style.display = "none";
          document.querySelector("#unity-fullscreen-button").onclick = () => {
            unityInstance.SetFullscreen(1);
          };
        }).catch((message) => {
          alert(message);
        });
      };

      document.body.appendChild(script);
    </script>
  </body>
</html>
